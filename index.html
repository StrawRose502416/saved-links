<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Enlaces</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header con perfil - PERSONALIZA ESTO -->
        <header class="profile">
            <div class="profile-image">
                <img src="https://via.placeholder.com/150" alt="Profile" id="profileImg">
            </div>
            <h1 id="profileName">Tu Nombre Aquí</h1>
            <p id="profileBio">Tu descripción o frase personal</p>
        </header>

        <!-- Sección de enlaces - Se cargan desde script.js -->
        <main class="links-container" id="linksContainer">
            <!-- Los enlaces se cargarán automáticamente -->
        </main>

        <!-- Footer -->
        <footer>
            <p>© 2024 - Todos los derechos reservados</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
