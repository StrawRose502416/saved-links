<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi LinkTree Personal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header con perfil -->
        <header class="profile">
            <div class="profile-image">
                <img src="https://via.placeholder.com/150" alt="Profile" id="profileImg">
            </div>
            <h1 id="profileName">Tu Nombre</h1>
            <p id="profileBio">Tu biografía o descripción aquí</p>
        </header>

        <!-- Sección de enlaces -->
        <main class="links-container" id="linksContainer">
            <!-- Los enlaces se cargarán dinámicamente aquí -->
        </main>

        <!-- Panel de administración (visible solo para el admin) -->
        <div class="admin-panel" id="adminPanel">
            <h3><i class="fas fa-cog"></i> Administrar Enlaces</h3>
            
            <form id="linkForm">
                <input type="text" id="linkTitle" placeholder="Título del enlace" required>
                <input type="url" id="linkUrl" placeholder="URL del enlace" required>
                <select id="linkIcon">
                    <option value="fab fa-youtube">YouTube</option>
                    <option value="fab fa-twitter">Twitter</option>
                    <option value="fab fa-instagram">Instagram</option>
                    <option value="fab fa-facebook">Facebook</option>
                    <option value="fab fa-linkedin">LinkedIn</option>
                    <option value="fab fa-github">GitHub</option>
                    <option value="fas fa-globe">Sitio Web</option>
                    <option value="fas fa-envelope">Email</option>
                    <option value="fas fa-phone">Teléfono</option>
                    <option value="fas fa-music">Música</option>
                </select>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-plus"></i> Agregar Enlace
                </button>
            </form>

            <button id="toggleAdminBtn" class="btn-secondary">
                <i class="fas fa-eye"></i> Ver Modo Público
            </button>
        </div>

        <!-- Botón flotante para admin -->
        <button id="adminFab" class="fab">
            <i class="fas fa-pen"></i>
        </button>

        <!-- Footer -->
        <footer>
            <p>© 2024 - Mi LinkTree Personal</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
